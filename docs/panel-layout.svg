<svg xmlns="http://www.w3.org/2000/svg" width="680" height="280" viewBox="0 0 680 280" role="img" font-family="Helvetica, Arial, sans-serif">
<title>IMSPI 8080 panel layout</title>
<desc>Left block: three rows of eight LEDs (address high, address low, data) over eight data toggles. Right block: one row of four status LEDs over four command switches. Dimensioned to about 220 mm usable width.</desc>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#8a8984" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>

<rect x="40" y="40" width="600" height="170" rx="12" fill="#2b2a27" stroke="#4a4945" stroke-width="1"/>
<text x="612" y="60" text-anchor="end" font-size="15" font-weight="500" fill="#e8e6df">IMSPI 8080</text>

<circle cx="84" cy="78" r="5" fill="#E24B4A"/><circle cx="114" cy="78" r="5" fill="#7a2523"/><circle cx="144" cy="78" r="5" fill="#E24B4A"/><circle cx="174" cy="78" r="5" fill="#E24B4A"/><circle cx="204" cy="78" r="5" fill="#7a2523"/><circle cx="234" cy="78" r="5" fill="#7a2523"/><circle cx="264" cy="78" r="5" fill="#E24B4A"/><circle cx="294" cy="78" r="5" fill="#7a2523"/>
<circle cx="84" cy="100" r="5" fill="#7a2523"/><circle cx="114" cy="100" r="5" fill="#E24B4A"/><circle cx="144" cy="100" r="5" fill="#7a2523"/><circle cx="174" cy="100" r="5" fill="#7a2523"/><circle cx="204" cy="100" r="5" fill="#E24B4A"/><circle cx="234" cy="100" r="5" fill="#E24B4A"/><circle cx="264" cy="100" r="5" fill="#7a2523"/><circle cx="294" cy="100" r="5" fill="#E24B4A"/>
<circle cx="84" cy="122" r="5" fill="#E24B4A"/><circle cx="114" cy="122" r="5" fill="#E24B4A"/><circle cx="144" cy="122" r="5" fill="#7a2523"/><circle cx="174" cy="122" r="5" fill="#E24B4A"/><circle cx="204" cy="122" r="5" fill="#7a2523"/><circle cx="234" cy="122" r="5" fill="#E24B4A"/><circle cx="264" cy="122" r="5" fill="#E24B4A"/><circle cx="294" cy="122" r="5" fill="#7a2523"/>

<text x="340" y="82" font-size="11" fill="#9a988f">addr 15-8</text>
<text x="340" y="104" font-size="11" fill="#9a988f">addr 7-0</text>
<text x="340" y="126" font-size="11" fill="#9a988f">data 7-0</text>

<text x="492" y="82" text-anchor="middle" font-size="11" fill="#9a988f">status</text>
<circle cx="450" cy="100" r="5" fill="#E24B4A"/><circle cx="478" cy="100" r="5" fill="#7a2523"/><circle cx="506" cy="100" r="5" fill="#7a2523"/><circle cx="534" cy="100" r="5" fill="#E24B4A"/>

<rect x="78" y="140" width="12" height="24" rx="3" fill="#378ADD"/><rect x="108" y="140" width="12" height="24" rx="3" fill="#E24B4A"/><rect x="138" y="140" width="12" height="24" rx="3" fill="#378ADD"/><rect x="168" y="140" width="12" height="24" rx="3" fill="#E24B4A"/><rect x="198" y="140" width="12" height="24" rx="3" fill="#378ADD"/><rect x="228" y="140" width="12" height="24" rx="3" fill="#E24B4A"/><rect x="258" y="140" width="12" height="24" rx="3" fill="#378ADD"/><rect x="288" y="140" width="12" height="24" rx="3" fill="#E24B4A"/>
<text x="189" y="184" text-anchor="middle" font-size="12" fill="#b8b6ae">8 data toggles - latching</text>

<rect x="444" y="140" width="12" height="24" rx="3" fill="#378ADD"/><rect x="472" y="140" width="12" height="24" rx="3" fill="#E24B4A"/><rect x="500" y="140" width="12" height="24" rx="3" fill="#378ADD"/><rect x="528" y="140" width="12" height="24" rx="3" fill="#E24B4A"/>
<text x="492" y="184" text-anchor="middle" font-size="12" fill="#b8b6ae">4 command - momentary</text>

<line x1="40" y1="238" x2="640" y2="238" stroke="#8a8984" stroke-width="1" marker-start="url(#arrow)" marker-end="url(#arrow)"/>
<line x1="40" y1="232" x2="40" y2="244" stroke="#8a8984" stroke-width="1"/>
<line x1="640" y1="232" x2="640" y2="244" stroke="#8a8984" stroke-width="1"/>
<text x="340" y="262" text-anchor="middle" font-size="12" fill="#6b6a64">= 220 mm usable width - 10 inch rack aperture</text>
</svg>
